version: '3.8'

services:
  task-roulette:
    build: .
    container_name: task-roulette-app
    ports:
      - "3000:3000"
    volumes:
      - task-roulette-data:/app/data
    environment:
      # Use a volume-mounted path for the SQLite database so it persists across container restarts
      - DATABASE_URL=file:/app/data/dev.db
      - AUTH_SECRET=super-secret-key-replace-in-production
      - AUTH_TRUST_HOST=https://task.brillyandro.com,http://localhost:3000,true
      - NEXTAUTH_URL=https://task.brillyandro.com
      - NEXT_PUBLIC_APP_URL=https://task.brillyandro.com
    restart: unless-stopped

volumes:
  task-roulette-data:
