<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dynamic Gradient Background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Base Circle -->
  <circle cx="50" cy="50" r="46" fill="url(#bg)" filter="url(#shadow)" />

  <!-- Inner highlight -->
  <circle cx="50" cy="50" r="40" fill="transparent" stroke="white" stroke-width="2" stroke-dasharray="4 8" opacity="0.6" />

  <!-- The target/roulette pin -->
  <path d="M50 20 L55 35 L45 35 Z" fill="#fcd34d" />
  <circle cx="50" cy="50" r="14" fill="#1e293b" />
  <circle cx="50" cy="50" r="8" fill="white" />
  <circle cx="50" cy="50" r="4" fill="#ef4444" />
</svg>
